backend:
  name: github
  repo: ysyoon0921/AIAN-WEB
  branch: cursor/strapi-nextjs-poc-bf00
  base_url: https://aian-web.vercel.app
  auth_endpoint: api/auth

media_folder: "web/public/uploads"
public_folder: "/uploads"
locale: "ko"

collections:
  # ---------------- 홈페이지 ----------------
  - name: "home"
    label: "홈페이지"
    files:
      - name: "home"
        label: "홈 문구"
        file: "web/src/content/home.json"
        fields:
          - label: "한국어"
            name: "ko"
            widget: "object"
            fields:
              - { label: "상단 배지", name: "eyebrow", widget: "string" }
              - { label: "히어로 제목", name: "heroTitle", widget: "text" }
              - { label: "히어로 부제", name: "heroSubtitle", widget: "text" }
              - { label: "신뢰 문구", name: "heroTrust", widget: "string" }
              - { label: "CTA 주 버튼", name: "ctaPrimary", widget: "string" }
              - { label: "CTA 보조 버튼", name: "ctaSecondary", widget: "string" }
              - { label: "문제 문구 1", name: "statementLine1", widget: "string" }
              - { label: "문제 문구 강조", name: "statementMuted", widget: "string" }
              - { label: "WHAT WE BUILD 라벨", name: "howLabel", widget: "string" }
              - { label: "WHAT WE BUILD 제목", name: "howTitle", widget: "text" }
              - { label: "WHAT WE BUILD 설명", name: "howLead", widget: "text" }
              - { label: "제품 라벨", name: "productsLabel", widget: "string" }
              - { label: "제품 제목", name: "productsTitle", widget: "string" }
              - { label: "제품 설명", name: "productsLead", widget: "text" }
              - { label: "성과 섹션 제목", name: "showcaseTitle", widget: "text" }
              - { label: "문의 제목", name: "contactTitle", widget: "text" }
              - { label: "문의 설명", name: "contactLead", widget: "text" }
              - label: "특징(features)"
                name: "features"
                widget: "list"
                fields:
                  - { label: "태그", name: "tag", widget: "string" }
                  - { label: "제목", name: "title", widget: "text" }
                  - { label: "설명", name: "description", widget: "text" }
                  - { label: "불릿", name: "bullets", widget: "list" }
                  - { label: "비주얼(pills/gauge/bars)", name: "visual", widget: "string" }
          - label: "English"
            name: "en"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Hero title", name: "heroTitle", widget: "text" }
              - { label: "Hero subtitle", name: "heroSubtitle", widget: "text" }
              - { label: "Trust line", name: "heroTrust", widget: "string" }
              - { label: "CTA primary", name: "ctaPrimary", widget: "string" }
              - { label: "CTA secondary", name: "ctaSecondary", widget: "string" }
              - { label: "Statement line 1", name: "statementLine1", widget: "string" }
              - { label: "Statement muted", name: "statementMuted", widget: "string" }
              - { label: "WHAT WE BUILD label", name: "howLabel", widget: "string" }
              - { label: "WHAT WE BUILD title", name: "howTitle", widget: "text" }
              - { label: "WHAT WE BUILD lead", name: "howLead", widget: "text" }
              - { label: "Products label", name: "productsLabel", widget: "string" }
              - { label: "Products title", name: "productsTitle", widget: "string" }
              - { label: "Products lead", name: "productsLead", widget: "text" }
              - { label: "Showcase title", name: "showcaseTitle", widget: "text" }
              - { label: "Contact title", name: "contactTitle", widget: "text" }
              - { label: "Contact lead", name: "contactLead", widget: "text" }
              - label: "Features"
                name: "features"
                widget: "list"
                fields:
                  - { label: "Tag", name: "tag", widget: "string" }
                  - { label: "Title", name: "title", widget: "text" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Bullets", name: "bullets", widget: "list" }
                  - { label: "Visual (pills/gauge/bars)", name: "visual", widget: "string" }

  # ---------------- 사이트 설정 ----------------
  - name: "site"
    label: "사이트 설정"
    files:
      - name: "site"
        label: "사이트 정보 · 로고 마퀴"
        file: "web/src/content/site.json"
        fields:
          - { label: "마퀴(고객사 이름들)", name: "marquee", widget: "list" }
          - label: "설정"
            name: "settings"
            widget: "object"
            fields:
              - label: "한국어"
                name: "ko"
                widget: "object"
                fields:
                  - { label: "사이트명", name: "siteName", widget: "string" }
                  - { label: "전화", name: "phone", widget: "string" }
                  - { label: "이메일", name: "email", widget: "string" }
                  - { label: "주소", name: "address", widget: "string" }
                  - { label: "푸터 태그라인", name: "footerTagline", widget: "string" }
                  - { label: "상담 버튼 라벨", name: "navCtaLabel", widget: "string" }
              - label: "English"
                name: "en"
                widget: "object"
                fields:
                  - { label: "Site name", name: "siteName", widget: "string" }
                  - { label: "Phone", name: "phone", widget: "string" }
                  - { label: "Email", name: "email", widget: "string" }
                  - { label: "Address", name: "address", widget: "string" }
                  - { label: "Footer tagline", name: "footerTagline", widget: "string" }
                  - { label: "CTA label", name: "navCtaLabel", widget: "string" }

  # ---------------- 제품 ----------------
  - name: "products"
    label: "제품"
    files:
      - name: "products"
        label: "제품 카드 (3개)"
        file: "web/src/content/products.json"
        fields:
          - label: "제품 목록"
            name: "items"
            widget: "list"
            fields:
              - { label: "slug", name: "slug", widget: "string" }
              - { label: "카드 ID", name: "cardId", widget: "string" }
              - { label: "정렬 순서", name: "sortOrder", widget: "number", value_type: "int" }
              - { label: "테마(default/dark/gauge)", name: "theme", widget: "string" }
              - { label: "링크 URL", name: "linkUrl", widget: "string" }
              - label: "한국어"
                name: "ko"
                widget: "object"
                fields:
                  - { label: "배지", name: "badge", widget: "string" }
                  - { label: "제품명", name: "name", widget: "string" }
                  - { label: "헤드라인", name: "headline", widget: "string" }
                  - { label: "설명", name: "description", widget: "text" }
                  - { label: "태그", name: "tags", widget: "list" }
              - label: "English"
                name: "en"
                widget: "object"
                fields:
                  - { label: "Badge", name: "badge", widget: "string" }
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Headline", name: "headline", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Tags", name: "tags", widget: "list" }

  # ---------------- 도입 사례 ----------------
  - name: "cases"
    label: "도입 사례"
    files:
      - name: "cases"
        label: "케이스 스터디"
        file: "web/src/content/cases.json"
        fields:
          - label: "사례 목록"
            name: "items"
            widget: "list"
            fields:
              - { label: "slug", name: "slug", widget: "string" }
              - { label: "정렬 순서", name: "sortOrder", widget: "number", value_type: "int" }
              - label: "한국어"
                name: "ko"
                widget: "object"
                fields:
                  - { label: "탭 라벨", name: "tabLabel", widget: "string" }
                  - { label: "카테고리", name: "category", widget: "string" }
                  - { label: "제목", name: "title", widget: "text" }
                  - { label: "설명", name: "description", widget: "text" }
                  - { label: "성과 불릿", name: "bullets", widget: "list" }
                  - { label: "목업 제목", name: "mockTitle", widget: "string" }
                  - label: "지표"
                    name: "mockStats"
                    widget: "list"
                    fields:
                      - { label: "값", name: "value", widget: "string" }
                      - { label: "라벨", name: "label", widget: "string" }
                  - label: "링크"
                    name: "links"
                    widget: "list"
                    fields:
                      - { label: "라벨", name: "label", widget: "string" }
                      - { label: "URL", name: "url", widget: "string" }
              - label: "English"
                name: "en"
                widget: "object"
                fields:
                  - { label: "Tab label", name: "tabLabel", widget: "string" }
                  - { label: "Category", name: "category", widget: "string" }
                  - { label: "Title", name: "title", widget: "text" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Bullets", name: "bullets", widget: "list" }
                  - { label: "Mock title", name: "mockTitle", widget: "string" }
                  - label: "Stats"
                    name: "mockStats"
                    widget: "list"
                    fields:
                      - { label: "Value", name: "value", widget: "string" }
                      - { label: "Label", name: "label", widget: "string" }
                  - label: "Links"
                    name: "links"
                    widget: "list"
                    fields:
                      - { label: "Label", name: "label", widget: "string" }
                      - { label: "URL", name: "url", widget: "string" }

  # ---------------- 솔루션/산업/고객사례 서브페이지 ----------------
  - name: "subpages"
    label: "솔루션·산업·고객사례"
    files:
      - name: "subpages"
        label: "서브페이지 문구"
        file: "web/src/content/subpages.json"
        fields:
          - label: "사이드바 헤더"
            name: "heads"
            widget: "object"
            fields:
              - label: "솔루션"
                name: "solutions"
                widget: "object"
                fields:
                  - { label: "한글", name: "ko", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "라벨", name: "label", widget: "string" }
              - label: "산업분야"
                name: "industry"
                widget: "object"
                fields:
                  - { label: "한글", name: "ko", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "라벨", name: "label", widget: "string" }
              - label: "고객사례"
                name: "customers"
                widget: "object"
                fields:
                  - { label: "한글", name: "ko", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "라벨", name: "label", widget: "string" }
          - label: "솔루션 페이지들"
            name: "solutions"
            widget: "list"
            fields:
              - { label: "slug", name: "slug", widget: "string" }
              - { label: "메뉴명(한)", name: "navKo", widget: "string" }
              - { label: "메뉴명(영)", name: "navEn", widget: "string" }
              - label: "한국어"
                name: "ko"
                widget: "object"
                fields:
                  - { label: "제목", name: "h1", widget: "text" }
                  - { label: "리드", name: "lead", widget: "text" }
                  - { label: "본문 문단", name: "body", widget: "list" }
              - label: "English"
                name: "en"
                widget: "object"
                fields:
                  - { label: "Title", name: "h1", widget: "text" }
                  - { label: "Lead", name: "lead", widget: "text" }
                  - { label: "Body paragraphs", name: "body", widget: "list" }
          - label: "산업분야 페이지들"
            name: "industry"
            widget: "list"
            fields:
              - { label: "slug", name: "slug", widget: "string" }
              - { label: "메뉴명(한)", name: "navKo", widget: "string" }
              - { label: "메뉴명(영)", name: "navEn", widget: "string" }
              - label: "한국어"
                name: "ko"
                widget: "object"
                fields:
                  - { label: "제목", name: "h1", widget: "text" }
                  - { label: "리드", name: "lead", widget: "text" }
                  - { label: "본문 문단", name: "body", widget: "list" }
              - label: "English"
                name: "en"
                widget: "object"
                fields:
                  - { label: "Title", name: "h1", widget: "text" }
                  - { label: "Lead", name: "lead", widget: "text" }
                  - { label: "Body paragraphs", name: "body", widget: "list" }
          - label: "고객사례 페이지들"
            name: "customers"
            widget: "list"
            fields:
              - { label: "slug", name: "slug", widget: "string" }
              - { label: "메뉴명(한)", name: "navKo", widget: "string" }
              - { label: "메뉴명(영)", name: "navEn", widget: "string" }
              - label: "한국어"
                name: "ko"
                widget: "object"
                fields:
                  - { label: "제목", name: "h1", widget: "text" }
                  - { label: "리드", name: "lead", widget: "text" }
                  - { label: "본문 문단", name: "body", widget: "list" }
              - label: "English"
                name: "en"
                widget: "object"
                fields:
                  - { label: "Title", name: "h1", widget: "text" }
                  - { label: "Lead", name: "lead", widget: "text" }
                  - { label: "Body paragraphs", name: "body", widget: "list" }

  # ---------------- 회사소개 ----------------
  - name: "about"
    label: "회사소개"
    files:
      - name: "about"
        label: "회사소개 (소개·CEO·연혁·오시는길)"
        file: "web/src/content/about.json"
        fields:
          - label: "소개(Intro)"
            name: "intro"
            widget: "object"
            fields:
              - label: "한국어"
                name: "ko"
                widget: "object"
                fields:
                  - { label: "라벨", name: "label", widget: "string" }
                  - { label: "제목", name: "title", widget: "text" }
                  - { label: "리드", name: "lead", widget: "text" }
                  - label: "카드"
                    name: "cards"
                    widget: "list"
                    fields:
                      - { label: "제목", name: "title", widget: "string" }
                      - { label: "내용", name: "body", widget: "text" }
              - label: "English"
                name: "en"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "text" }
                  - { label: "Lead", name: "lead", widget: "text" }
                  - label: "Cards"
                    name: "cards"
                    widget: "list"
                    fields:
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Body", name: "body", widget: "text" }
          - label: "CEO"
            name: "ceo"
            widget: "object"
            fields:
              - label: "한국어"
                name: "ko"
                widget: "object"
                fields:
                  - { label: "라벨", name: "label", widget: "string" }
                  - { label: "제목", name: "title", widget: "text" }
                  - { label: "리드", name: "lead", widget: "text" }
                  - { label: "이름", name: "name", widget: "string" }
                  - { label: "직함", name: "role", widget: "string" }
                  - { label: "본문(HTML)", name: "body", widget: "text" }
              - label: "English"
                name: "en"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "text" }
                  - { label: "Lead", name: "lead", widget: "text" }
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Role", name: "role", widget: "string" }
                  - { label: "Body (HTML)", name: "body", widget: "text" }
          - label: "연혁(History) 헤더"
            name: "history"
            widget: "object"
            fields:
              - label: "한국어"
                name: "ko"
                widget: "object"
                fields:
                  - { label: "라벨", name: "label", widget: "string" }
                  - { label: "제목", name: "title", widget: "text" }
                  - { label: "리드", name: "lead", widget: "text" }
              - label: "English"
                name: "en"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "text" }
                  - { label: "Lead", name: "lead", widget: "text" }
          - label: "연혁 항목"
            name: "timeline"
            widget: "list"
            fields:
              - { label: "연도", name: "year", widget: "string" }
              - { label: "정렬 순서", name: "sortOrder", widget: "number", value_type: "int" }
              - label: "한국어"
                name: "ko"
                widget: "object"
                fields:
                  - { label: "제목", name: "title", widget: "string" }
                  - { label: "설명", name: "description", widget: "text" }
              - label: "English"
                name: "en"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
          - label: "오시는 길(Location)"
            name: "location"
            widget: "object"
            fields:
              - label: "한국어"
                name: "ko"
                widget: "object"
                fields:
                  - { label: "라벨", name: "label", widget: "string" }
                  - { label: "제목", name: "title", widget: "string" }
                  - { label: "지도 링크 라벨", name: "mapLinkLabel", widget: "string" }
              - label: "English"
                name: "en"
                widget: "object"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Map link label", name: "mapLinkLabel", widget: "string" }
              - { label: "지도 임베드 URL", name: "mapEmbedUrl", widget: "string" }
              - { label: "지도 링크 URL", name: "mapLinkUrl", widget: "string" }

  # ---------------- 소식 (한국어) ----------------
  - name: "news_ko"
    label: "소식 (한국어)"
    folder: "web/src/content/news/ko"
    extension: "mdx"
    format: "frontmatter"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "날짜", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
      - { label: "요약", name: "summary", widget: "string" }
      - { label: "본문", name: "body", widget: "markdown" }

  # ---------------- 소식 (English) ----------------
  - name: "news_en"
    label: "News (English)"
    folder: "web/src/content/news/en"
    extension: "mdx"
    format: "frontmatter"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
      - { label: "Summary", name: "summary", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
